<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project P&L Dashboard - Full Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in-right { animation: slideInRight 0.4s ease-out; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Highlight components */
        .formula-box {
            background: #0f172a;
            color: #38bdf8;
            border-left: 4px solid #0ea5e9;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('agenda');

            return (
                <div className="h-full bg-slate-50 flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-20 shrink-0">
                        <div className="p-6 bg-slate-800 border-b border-slate-700">
                            <h1 className="text-2xl font-black text-blue-400 tracking-tight flex items-center">
                                <i className="ph ph-trend-up mr-2 text-3xl"></i> Project P&L
                            </h1>
                            <p className="text-xs text-slate-300 mt-2 font-medium">Interactive Learning Dashboard</p>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-2 px-2">Learning Sections</div>
                            <NavButton active={activeTab === 'agenda'} onClick={() => setActiveTab('agenda')} 
                                icon={<i className="ph ph-book-open-text text-[20px]"></i>} text="1. เนื้อหาหลัก (8 Agendas)" />
                            <NavButton active={activeTab === 'simulator'} onClick={() => setActiveTab('simulator')} 
                                icon={<i className="ph ph-calculator text-[20px]"></i>} text="2. เครื่องจำลอง (Simulator)" />
                            <NavButton active={activeTab === 'casestudy'} onClick={() => setActiveTab('casestudy')} 
                                icon={<i className="ph ph-briefcase text-[20px]"></i>} text="3. กรณีศึกษา (Case Study)" />
                            
                            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">Exercises</div>
                            <NavButton active={activeTab === 'exercise1'} onClick={() => setActiveTab('exercise1')} 
                                icon={<i className="ph ph-pencil-simple text-[20px]"></i>} text="4. แบบฝึกหัด 1 (Costs)" />
                            <NavButton active={activeTab === 'exercise2'} onClick={() => setActiveTab('exercise2')} 
                                icon={<i className="ph ph-table text-[20px]"></i>} text="5. แบบฝึกหัด 2 (Build P&L)" />
                            
                            {/* พื้นที่สำหรับแบบฝึกหัด 3-6 ในอนาคต */}
                            <div className="opacity-50 pointer-events-none space-y-2">
                                <NavButton active={false} onClick={() => {}} icon={<i className="ph ph-lock text-[20px]"></i>} text="6. แบบฝึกหัด 3 (รออัปโหลด)" />
                                <NavButton active={false} onClick={() => {}} icon={<i className="ph ph-lock text-[20px]"></i>} text="7. แบบฝึกหัด 4 (รออัปโหลด)" />
                                <NavButton active={false} onClick={() => {}} icon={<i className="ph ph-lock text-[20px]"></i>} text="8. แบบฝึกหัด 5 (รออัปโหลด)" />
                                <NavButton active={false} onClick={() => {}} icon={<i className="ph ph-lock text-[20px]"></i>} text="9. แบบฝึกหัด 6 (รออัปโหลด)" />
                            </div>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-hidden bg-slate-50 flex flex-col">
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-7xl mx-auto h-full">
                                {activeTab === 'agenda' && <AgendaSection />}
                                {activeTab === 'simulator' && <SimulatorSection />}
                                {activeTab === 'casestudy' && <CaseStudySection />}
                                {activeTab === 'exercise1' && <Exercise1Section />}
                                {activeTab === 'exercise2' && <Exercise2Section />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        function NavButton({ active, onClick, icon, text }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                    active ? 'bg-blue-600 text-white shadow-md shadow-blue-900/20 translate-x-1' : 'text-slate-300 hover:bg-slate-800 hover:text-white'
                }`}>
                    {icon}
                    <span className="font-semibold text-sm text-left leading-tight">{text}</span>
                </button>
            );
        }

        // ==========================================
        // 5. Exercise 2 Section (Build P&L)
        // ==========================================
        function Exercise2Section() {
            // State สำหรับเก็บค่า input ต่างๆ (เริ่มต้นเป็นค่าว่าง)
            const [data, setData] = useState({
                volume: '',
                price: '',
                instructorFee: '',
                teachingAssistant: '',
                courseMaterials: '',
                aiSoftware: '',
                certificatePrinting: '',
                coffeeBreak: '',
                classroomFacility: '',
                adminSupport: '',
                marketingCampaign: '',
                itSystem: '',
                utilities: ''
            });

            // ฟังก์ชันจัดการการเปลี่ยนแปลงค่า
            const handleInputChange = (field, value) => {
                setData(prev => ({ ...prev, [field]: value }));
            };

            // Helpers สำหรับแปลงเป็นตัวเลขเพื่อคำนวณ
            const getNum = (val) => Number(val) || 0;
            const formatNum = (num) => num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

            // คำนวณค่าต่างๆ
            const volume = getNum(data.volume);
            const revenue = volume * getNum(data.price);
            
            const totalDirectCosts = getNum(data.instructorFee) + getNum(data.teachingAssistant) + 
                                     getNum(data.courseMaterials) + getNum(data.aiSoftware) + 
                                     getNum(data.certificatePrinting) + getNum(data.coffeeBreak);
                                     
            const grossProfit = revenue - totalDirectCosts;
            const grossMargin = revenue > 0 ? (grossProfit / revenue) * 100 : 0;
            
            const totalOpEx = getNum(data.classroomFacility) + getNum(data.adminSupport) + 
                              getNum(data.marketingCampaign) + getNum(data.itSystem) + 
                              getNum(data.utilities);
                              
            const operatingProfit = grossProfit - totalOpEx;
            const profitMargin = revenue > 0 ? (operatingProfit / revenue) * 100 : 0;

            // ฟังก์ชันดาวน์โหลด CSV
            const downloadCSV = () => {
                const rows = [
                    ['', '', ''],
                    ['Revenue', '', revenue],
                    ['Volume', '', data.volume],
                    ['Price', '', data.price],
                    ['', '', ''],
                    ['Direct Costs', '', totalDirectCosts],
                    ['Instructor fee', '3,000 THB X 12 hrs', data.instructorFee],
                    ['Teaching assistant', '1,500 THB X 2 people X 2 days', data.teachingAssistant],
                    ['Course materials', '150 THB X 100 students', data.courseMaterials],
                    ['AI software license', '200 THB X 100 students', data.aiSoftware],
                    ['Certificate printing', '50 THB X 100 students', data.certificatePrinting],
                    ['Coffee break', '120 THB X 100 students', data.coffeeBreak],
                    ['', '', ''],
                    ['Gross Profit', '', grossProfit],
                    ['%Gross Margin', '', `${grossMargin.toFixed(2)}%`],
                    ['', '', ''],
                    ['Operating Expenses', '', totalOpEx],
                    ['Classroom facility allocation', '', data.classroomFacility],
                    ['Admin support', '', data.adminSupport],
                    ['Marketing campaign', '', data.marketingCampaign],
                    ['IT / system', '', data.itSystem],
                    ['Utilities', '', data.utilities],
                    ['', '', ''],
                    ['Operating Profit', '', operatingProfit],
                    ['%Profit Margin', '', `${profitMargin.toFixed(2)}%`]
                ];
                
                const csvContent = rows.map(r => r.map(cell => `"${cell}"`).join(',')).join('\n');
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', '02_Build_PL_Answer.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Input Row Component สำหรับความสะดวก
            const InputRow = ({ label, hint, field }) => (
                <tr className="hover:bg-slate-50 transition-colors border-b border-slate-100">
                    <td className="p-3 pl-8 text-slate-700 font-medium w-1/3">{label}</td>
                    <td className="p-3 text-slate-500 text-sm italic w-1/3">{hint}</td>
                    <td className="p-2 w-1/3">
                        <input 
                            type="number" 
                            value={data[field]} 
                            onChange={(e) => handleInputChange(field, e.target.value)}
                            className="w-full p-2 rounded-lg border border-slate-200 outline-none text-right font-mono transition-colors focus:border-blue-500 focus:bg-blue-50"
                            placeholder="0"
                        />
                    </td>
                </tr>
            );

            return (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 pb-6 border-b border-slate-100 gap-4">
                            <div>
                                <h2 className="text-2xl font-black text-slate-800 flex items-center">
                                    <i className="ph ph-table text-3xl mr-3 text-blue-600"></i> แบบฝึกหัด 2: Build P&L
                                </h2>
                                <p className="text-slate-600 mt-2">กรอกตัวเลขในช่องว่างเพื่อสร้างงบกำไรขาดทุน (P&L) ตามคำใบ้ที่ให้ไว้ ระบบจะคำนวณยอดรวมให้อัตโนมัติ</p>
                            </div>
                            <button 
                                onClick={downloadCSV}
                                className="flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-xl font-bold transition-colors shadow-md shadow-emerald-600/20 shrink-0"
                            >
                                <i className="ph ph-microsoft-excel-logo text-xl"></i>
                                <span>ดาวน์โหลดเป็น Excel (CSV)</span>
                            </button>
                        </div>

                        <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                            <table className="w-full text-left whitespace-nowrap">
                                <thead className="bg-slate-800 text-white">
                                    <tr>
                                        <th className="p-4 font-bold">รายการ (Item)</th>
                                        <th className="p-4 font-bold">คำอธิบาย / วิธีคำนวณ (Description)</th>
                                        <th className="p-4 font-bold text-right">จำนวนเงิน (Amount - THB)</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-slate-100">
                                    
                                    {/* Revenue Section */}
                                    <tr className="bg-emerald-50 border-b-2 border-emerald-200">
                                        <td className="p-3 font-bold text-emerald-800">Revenue (รายได้)</td>
                                        <td></td>
                                        <td className="p-3 font-black text-right text-emerald-700 text-lg">{formatNum(revenue)}</td>
                                    </tr>
                                    <InputRow label="Volume (จำนวนนักเรียน)" hint="" field="volume" />
                                    <InputRow label="Price (ราคาต่อหัว)" hint="" field="price" />
                                    
                                    {/* Direct Costs Section */}
                                    <tr className="bg-rose-50 border-b-2 border-rose-200 border-t-4">
                                        <td className="p-3 font-bold text-rose-800">Direct Costs (ต้นทุนทางตรง)</td>
                                        <td></td>
                                        <td className="p-3 font-black text-right text-rose-700 text-lg">- {formatNum(totalDirectCosts)}</td>
                                    </tr>
                                    <InputRow label="Instructor fee" hint="3,000 THB X 12 hrs" field="instructorFee" />
                                    <InputRow label="Teaching assistant" hint="1,500 THB X 2 people X 2 days" field="teachingAssistant" />
                                    <InputRow label="Course materials" hint={`150 THB X ${volume || '100'} students`} field="courseMaterials" />
                                    <InputRow label="AI software license" hint={`200 THB X ${volume || '100'} students`} field="aiSoftware" />
                                    <InputRow label="Certificate printing" hint={`50 THB X ${volume || '100'} students`} field="certificatePrinting" />
                                    <InputRow label="Coffee break" hint={`120 THB X ${volume || '100'} students`} field="coffeeBreak" />
                                    
                                    {/* Gross Profit Section */}
                                    <tr className="bg-blue-100 border-b border-blue-200 border-t-4">
                                        <td className="p-4 font-black text-blue-900 text-lg">Gross Profit (กำไรขั้นต้น)</td>
                                        <td></td>
                                        <td className="p-4 font-black text-right text-blue-900 text-xl">{formatNum(grossProfit)}</td>
                                    </tr>
                                    <tr className="bg-blue-50 border-b border-blue-200">
                                        <td className="p-3 font-bold text-blue-800">% Gross Margin</td>
                                        <td></td>
                                        <td className="p-3 font-black text-right text-blue-700">{grossMargin.toFixed(2)}%</td>
                                    </tr>

                                    {/* Operating Expenses Section */}
                                    <tr className="bg-amber-50 border-b-2 border-amber-200 border-t-4">
                                        <td className="p-3 font-bold text-amber-800">Operating Expenses (ค่าใช้จ่ายดำเนินงาน)</td>
                                        <td></td>
                                        <td className="p-3 font-black text-right text-amber-700 text-lg">- {formatNum(totalOpEx)}</td>
                                    </tr>
                                    <InputRow label="Classroom facility allocation" hint="" field="classroomFacility" />
                                    <InputRow label="Admin support" hint="" field="adminSupport" />
                                    <InputRow label="Marketing campaign" hint="" field="marketingCampaign" />
                                    <InputRow label="IT / system" hint="" field="itSystem" />
                                    <InputRow label="Utilities" hint="" field="utilities" />

                                    {/* Operating Profit Section */}
                                    <tr className="bg-indigo-600 text-white border-b border-indigo-700 border-t-4">
                                        <td className="p-5 font-black text-xl flex items-center">
                                            <i className="ph-fill ph-star text-yellow-300 mr-2"></i> Operating Profit (กำไรจากการดำเนินงาน)
                                        </td>
                                        <td></td>
                                        <td className="p-5 font-black text-right text-2xl text-white">{formatNum(operatingProfit)}</td>
                                    </tr>
                                    <tr className="bg-indigo-50 border-b border-indigo-200">
                                        <td className="p-4 font-bold text-indigo-900">% Profit Margin</td>
                                        <td></td>
                                        <td className="p-4 font-black text-right text-indigo-700 text-lg">{profitMargin.toFixed(2)}%</td>
                                    </tr>

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. Exercise 1 Section (โค้ดเดิม)
        // ==========================================
        function Exercise1Section() {
            // Initial Data based on the CSV provided
            const initialData = [
                { id: 1, name: "Instructor fee", directIndirect: "", variableFixed: "" },
                { id: 2, name: "Course materials", directIndirect: "", variableFixed: "" },
                { id: 3, name: "Software per student", directIndirect: "", variableFixed: "" },
                { id: 4, name: "Admin salary", directIndirect: "", variableFixed: "" },
                { id: 5, name: "Classroom facility", directIndirect: "", variableFixed: "" },
                { id: 6, name: "Marketing to promote university", directIndirect: "", variableFixed: "" },
                { id: 7, name: "Media to promote this course", directIndirect: "", variableFixed: "" },
                { id: 8, name: "Printing per student", directIndirect: "", variableFixed: "" },
                { id: 9, name: "Payment fee", directIndirect: "", variableFixed: "" },
                { id: 10, name: "Guest lecturer", directIndirect: "", variableFixed: "" },
                { id: 11, name: "Electricity", directIndirect: "", variableFixed: "" },
                { id: 12, name: "University Building", directIndirect: "", variableFixed: "" }
            ];

            const [data, setData] = useState(initialData);

            const handleSelectChange = (id, field, value) => {
                setData(data.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const downloadCSV = () => {
                const headers = ['Cost', 'Direct / Indirect', 'Variable / Fixed'];
                const rows = data.map(item => [
                    `"${item.name}"`, 
                    `"${item.directIndirect}"`, 
                    `"${item.variableFixed}"`
                ]);
                
                const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', '01_Fixed_vs_Variable_Costs_Answer.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 pb-6 border-b border-slate-100 gap-4">
                            <div>
                                <h2 className="text-2xl font-black text-slate-800 flex items-center">
                                    <i className="ph ph-pencil-simple-line text-3xl mr-3 text-blue-600"></i> แบบฝึกหัด 1: Fixed vs Variable Costs
                                </h2>
                                <p className="text-slate-600 mt-2">โปรดจัดหมวดหมู่ต้นทุนต่อไปนี้ให้ถูกต้อง (เลือกคำตอบจาก Dropdown ในตาราง)</p>
                            </div>
                            <button 
                                onClick={downloadCSV}
                                className="flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-xl font-bold transition-colors shadow-md shadow-emerald-600/20 shrink-0"
                            >
                                <i className="ph ph-microsoft-excel-logo text-xl"></i>
                                <span>ดาวน์โหลดเป็น Excel (CSV)</span>
                            </button>
                        </div>

                        <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-700">
                                        <th className="p-4 font-bold border-b w-1/3">Cost Item (รายการต้นทุน)</th>
                                        <th className="p-4 font-bold border-b w-1/3">Direct / Indirect</th>
                                        <th className="p-4 font-bold border-b w-1/3">Variable / Fixed</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-slate-100">
                                    {data.map((item, index) => (
                                        <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-medium text-slate-800">
                                                <span className="text-slate-400 mr-2">{index + 1}.</span> 
                                                {item.name}
                                            </td>
                                            <td className="p-3">
                                                <select 
                                                    value={item.directIndirect}
                                                    onChange={(e) => handleSelectChange(item.id, 'directIndirect', e.target.value)}
                                                    className={`w-full p-2 rounded-lg border outline-none font-medium transition-colors cursor-pointer ${
                                                        item.directIndirect === 'Direct' ? 'bg-blue-50 border-blue-300 text-blue-700' :
                                                        item.directIndirect === 'Indirect' ? 'bg-amber-50 border-amber-300 text-amber-700' :
                                                        'bg-slate-50 border-slate-200 text-slate-600 focus:border-blue-500'
                                                    }`}
                                                >
                                                    <option value="">-- เลือกประเภท --</option>
                                                    <option value="Direct">Direct (ทางตรง)</option>
                                                    <option value="Indirect">Indirect (ทางอ้อม)</option>
                                                </select>
                                            </td>
                                            <td className="p-3">
                                                <select 
                                                    value={item.variableFixed}
                                                    onChange={(e) => handleSelectChange(item.id, 'variableFixed', e.target.value)}
                                                    className={`w-full p-2 rounded-lg border outline-none font-medium transition-colors cursor-pointer ${
                                                        item.variableFixed === 'Variable' ? 'bg-rose-50 border-rose-300 text-rose-700' :
                                                        item.variableFixed === 'Fixed' ? 'bg-slate-200 border-slate-400 text-slate-800' :
                                                        item.variableFixed === 'Semi-Variable' ? 'bg-purple-50 border-purple-300 text-purple-700' :
                                                        'bg-slate-50 border-slate-200 text-slate-600 focus:border-blue-500'
                                                    }`}
                                                >
                                                    <option value="">-- เลือกประเภท --</option>
                                                    <option value="Variable">Variable (ผันแปร)</option>
                                                    <option value="Fixed">Fixed (คงที่)</option>
                                                    <option value="Semi-Variable">Semi-Variable (กึ่งผันแปร)</option>
                                                </select>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 1. Agenda Section (โค้ดเดิม)
        // ==========================================
        function AgendaSection() {
            const [activeTopic, setActiveTopic] = useState(0);

            const topics = [
                {
                    title: "Definition 'Project P&L Feasibility'",
                    icon: <i className="ph ph-info text-blue-500"></i>,
                    content: (
                        <div className="space-y-4">
                            <h3 className="text-xl font-bold text-slate-800 border-b pb-2">คำนิยามและความสำคัญ</h3>

                                                    <li>ยอดคนเรียนเยอะสุด</li>
                                                    <li>รักษาราคาเดิมได้</li>
                                                    <li>คุมต้นทุนได้ดีเยี่ยม</li>
                                                </ul>
                                            </div>
                                            <div className="bg-blue-50 border border-blue-200 p-3 rounded-lg">
                                                <div className="font-black text-blue-800 border-b border-blue-200 pb-1 mb-1">Base Case</div>
                                                <ul className="text-xs text-blue-700 list-disc pl-3">
                                                    <li>ยอดคนเรียนตามเป้า</li>
                                                    <li>ราคาและต้นทุนปกติ</li>
                                                </ul>
                                            </div>
                                            <div className="bg-rose-50 border border-rose-200 p-3 rounded-lg">
                                                <div className="font-black text-rose-800 border-b border-rose-200 pb-1 mb-1">Worst Case</div>
                                                <ul className="text-xs text-rose-700 list-disc pl-3">
                                                    <li>ยอดตกต่ำสุด</li>
                                                    <li>ต้องให้ส่วนลดเยอะ</li>
                                                    <li>ต้นทุนและค่าล่วงเวลาพุ่ง</li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    title: "Break-Even Analysis",
                    icon: <i className="ph ph-scales text-teal-500"></i>,
                    content: (
                        <div className="space-y-4">
                            <h3 className="text-xl font-bold text-slate-800 border-b pb-2">การวิเคราะห์จุดคุ้มทุน (Break-Even)</h3>
                            <p className="text-slate-600">หา "ยอดขายขั้นต่ำ" (หน่วย) ที่ทำให้มีรายได้พอดีกับต้นทุนทั้งหมด (ไม่มีกำไร แต่ไม่ขาดทุน) กำไร = 0</p>
                            
                            <div className="formula-box p-5 rounded-3xl my-4 relative overflow-hidden">
                                <i className="ph ph-calculator absolute -right-4 -bottom-4 text-8xl text-slate-700/50"></i>
                                <div className="text-sm tracking-widest text-teal-400 font-bold mb-3 uppercase">สูตรคำนวณจุดคุ้มทุน (Break-Even Units)</div>
                                
                                <div className="flex flex-col items-center justify-center font-mono text-xl md:text-2xl font-black bg-slate-900/50 p-4 rounded-xl border border-slate-700 w-fit mx-auto relative z-10">
                                    <div className="text-amber-400 mb-2">Total Fixed Costs (FC)</div>
                                    <div className="w-full h-1 bg-slate-500 rounded my-1"></div>
                                    <div className="flex space-x-2 mt-2 text-sm md:text-xl">
                                        <span className="text-slate-300">(</span>
                                        <span className="text-emerald-400">Price</span>
                                        <span className="text-slate-300">-</span>
                                        <span className="text-rose-400">VC per unit</span>
                                        <span className="text-slate-300">)</span>
                                    </div>
                                </div>
                                <div className="text-center text-xs text-slate-400 mt-3 font-medium">* ตัวหาร (Price - VC) เรียกว่า <span className="text-teal-300 font-bold">Contribution Margin per Unit (กำไรส่วนเกิน)</span></div>
                            </div>

                            <div className="bg-white border border-teal-200 rounded-2xl p-5 shadow-sm relative mt-2">
                                <div className="absolute -top-3 left-6 bg-teal-100 text-teal-800 font-black text-xs px-3 py-1 rounded-full border border-teal-200 shadow-sm flex items-center">
                                    <i className="ph-fill ph-lightbulb mr-1 text-teal-500"></i> ตัวอย่างจากสไลด์
                                </div>
                                
                                <div className="grid md:grid-cols-2 gap-6 mt-2">
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                                        <h5 className="font-bold text-slate-700 mb-2 border-b pb-1 text-sm">สมมติฐาน</h5>
                                        <ul className="text-sm space-y-1 text-slate-600 font-mono">
                                            <li className="flex justify-between"><span>ราคาขาย (Price)</span> <span className="font-bold text-emerald-600">150</span></li>
                                            <li className="flex justify-between"><span>ต้นทุนผันแปร (VC)</span> <span className="font-bold text-rose-600">60</span></li>
                                            <li className="flex justify-between"><span>ต้นทุนคงที่ (FC)</span> <span className="font-bold text-amber-600">20,000</span></li>
                                        </ul>
                                    </div>
                                    
                                    <div className="flex flex-col justify-center">
                                        <div className="text-xs text-slate-600 mb-1 font-bold">1) หากำไรส่วนเกิน (Contribution Margin):</div>
                                        <div className="font-mono bg-slate-100 p-1.5 rounded text-center text-teal-700 font-bold mb-2 border border-slate-200 text-sm">
                                            150 - 60 = 90 บ./ชิ้น
                                        </div>
                                        <div className="text-xs text-slate-600 mb-1 font-bold">2) หาจุดคุ้มทุน (Break-Even):</div>
                                        <div className="font-mono bg-teal-600 text-white p-2 rounded-lg text-center font-black text-lg shadow-md">
                                            20,000 ÷ 90 = 222.22 (≈ 222 ชิ้น)
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    title: "How to Interpret a P&L",
                    icon: <i className="ph ph-magnifying-glass text-purple-500"></i>,
                    content: (
                        <div className="space-y-4">
                            <h3 className="text-xl font-bold text-slate-800 border-b pb-2">การตีความ P&L เพื่อตัดสินใจ (GO / NO-GO)</h3>
                            
                            <div className="formula-box p-4 rounded-2xl mb-4">
                                <div className="text-xs tracking-widest text-slate-400 font-bold mb-1 uppercase">ตัวชี้วัดสำคัญ</div>
                                <div className="font-mono text-sm md:text-lg font-black flex items-center flex-wrap">
                                    <span className="text-white">Operating Margin %</span> 
                                    <span className="text-slate-400 mx-2">=</span> 
                                    <span className="bg-slate-800 px-2 py-1 rounded text-yellow-300">(Operating Profits ÷ Revenue)</span>
                                </div>
                            </div>

                            <div className="space-y-4 mt-2">
                                {/* Step 1 */}
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                    <h4 className="font-bold text-purple-800 mb-2">Step 1 & 2: ประเมิน Gross & Operating Margin</h4>
                                    
                                    <div className="grid grid-cols-2 gap-4 text-xs font-mono">
                                        <div className="bg-slate-50 border border-slate-200 p-2 rounded">
                                            <p className="font-bold text-slate-800 mb-1 text-center bg-slate-200 rounded">Gross Margin</p>
                                            <p className="text-rose-600">{"<"} 20% : Very Weak</p>
                                            <p className="text-amber-600">20-35% : Moderate</p>
                                            <p className="text-blue-600">35-60% : Healthy</p>
                                            <p className="text-emerald-600 font-bold">60%+ : Very Strong</p>
                                        </div>
                                        <div className="bg-indigo-50 border border-indigo-200 p-2 rounded">
                                            <p className="font-bold text-indigo-900 mb-1 text-center bg-indigo-200 rounded">Operating Margin</p>
                                            <p className="text-rose-600">Negative : Not Feasible</p>
                                            <p className="text-orange-600">0-5% : Very Fragile</p>
                                            <p className="text-blue-600">10-20% : Good</p>
                                            <p className="text-emerald-600 font-bold">+20% : Strong</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 3 & 4 */}
                                <div className="grid md:grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="font-bold text-purple-800 mb-2 text-sm">Step 3: เทียบ Volume กับ BEP</h4>
                                        <ul className="text-xs space-y-2 text-slate-700">
                                            <li className="flex items-center"><i className="ph-fill ph-check-circle text-emerald-500 mr-2 text-lg"></i> <b>เป้า {">>"} จุดคุ้มทุน:</b> Strong</li>
                                            <li className="flex items-center"><i className="ph-fill ph-warning text-amber-500 mr-2 text-lg"></i> <b>เป้า {">"} จุดคุ้มทุนเล็กน้อย:</b> Risk</li>
                                            <li className="flex items-center"><i className="ph-fill ph-x-circle text-rose-500 mr-2 text-lg"></i> <b>เป้า {"<"} จุดคุ้มทุน:</b> High Risk / NO-GO</li>
                                        </ul>
                                    </div>
                                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="font-bold text-purple-800 mb-2 text-sm">Step 4: Check Risk Tolerance</h4>
                                        <p className="text-xs text-slate-600">
                                            ทดสอบว่าถ้ายอดขายตก 10-20% หรือต้นทุนเพิ่มขึ้น โปรเจกต์จะยังรอดไหม?<br/><br/>
                                            <span className="font-bold text-rose-600">"If small changes eliminate profit = fragile (เปราะบาง)"</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                }
            ];

            return (
                <div className="h-full flex flex-col md:flex-row gap-6 fade-in">
                    {/* Left: Agenda List */}
                    <div className="w-full md:w-5/12 lg:w-4/12 flex flex-col h-[350px] md:h-full bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden shrink-0">
                        <div className="p-4 bg-slate-50 border-b border-slate-100 shrink-0">
                            <h2 className="font-black text-slate-800 text-lg">8 Agendas</h2>
                            <p className="text-xs text-slate-500">คลิกที่หัวข้อเพื่ออ่านรายละเอียดเชิงลึก</p>
                        </div>
                        <div className="overflow-y-auto p-3 space-y-2 flex-1 pb-10">
                            {topics.map((topic, index) => (
                                <button 
                                    key={index}
                                    onClick={() => setActiveTopic(index)}
                                    className={`w-full text-left p-3 rounded-xl flex items-start transition-all duration-200 border ${
                                        activeTopic === index 
                                        ? 'bg-blue-50 border-blue-300 shadow-md ring-2 ring-blue-100 scale-[1.02] z-10 relative' 
                                        : 'bg-white border-transparent hover:bg-slate-50 hover:border-slate-200'
                                    }`}
                                >
                                    <div className="mt-0.5 mr-3 bg-white rounded-lg p-1.5 shadow-sm border border-slate-100 text-lg">
                                        {topic.icon}
                                    </div>
                                    <div>
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-0.5">Topic {index + 1}</div>
                                        <div className={`text-sm font-bold leading-tight ${activeTopic === index ? 'text-blue-900' : 'text-slate-700'}`}>
                                            {topic.title}
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Right: Content Details */}
                    <div className="w-full md:w-7/12 lg:w-8/12 h-auto md:h-full flex flex-col min-h-[500px]">
                        <div key={activeTopic} className="bg-white rounded-3xl p-6 md:p-10 border border-slate-200 shadow-lg flex-1 overflow-y-auto slide-in-right relative">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-slate-50 rounded-bl-[100px] -z-10"></div>
                            
                            <div className="flex items-center mb-6 border-b border-slate-100 pb-4">
                                <div className="p-3 bg-slate-50 rounded-2xl shadow-sm border border-slate-100 mr-4 text-4xl">
                                    {topics[activeTopic].icon}
                                </div>
                                <div>
                                    <span className="text-xs font-black tracking-widest text-slate-400 uppercase block mb-1">Topic {activeTopic + 1}</span>
                                    <h2 className="text-2xl font-black text-slate-800 leading-tight">{topics[activeTopic].title}</h2>
                                </div>
                            </div>

                            <div className="prose prose-slate max-w-none pb-10">
                                {topics[activeTopic].content}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 2. Simulator Section (โค้ดเดิม)
        // ==========================================
        function SimulatorSection() {
            const [price, setPrice] = useState(5000);
            const [variableCost, setVariableCost] = useState(1500);
            const [fixedCost, setFixedCost] = useState(100000);
            const [projectedVolume, setProjectedVolume] = useState(40);

            const contributionMarginPerUnit = price - variableCost;
            const breakEvenVolume = contributionMarginPerUnit > 0 ? Math.ceil(fixedCost / contributionMarginPerUnit) : 0;
            const totalRevenue = projectedVolume * price;
            const totalVariableCost = projectedVolume * variableCost;
            const grossProfit = totalRevenue - totalVariableCost; 
            const operatingProfit = grossProfit - fixedCost;

            const grossMarginPct = totalRevenue > 0 ? (grossProfit / totalRevenue) * 100 : 0;
            const operatingMarginPct = totalRevenue > 0 ? (operatingProfit / totalRevenue) * 100 : 0;

            const getOpMarginStatus = (margin) => {
                if (margin < 0) return { label: 'Not Feasible (ทำไม่ได้)', color: 'text-rose-600', bg: 'bg-rose-100' };
                if (margin <= 5) return { label: 'Very Fragile (เปราะบาง)', color: 'text-orange-600', bg: 'bg-orange-100' };
                if (margin <= 10) return { label: 'Acceptable (พอรับได้)', color: 'text-amber-600', bg: 'bg-amber-100' };
                if (margin <= 20) return { label: 'Good (ดี)', color: 'text-green-600', bg: 'bg-green-100' };
                return { label: 'Strong Feasibility (ลุย!)', color: 'text-emerald-700', bg: 'bg-emerald-100' };
            };

            const getDecision = () => {
                if (operatingProfit < 0 || projectedVolume < breakEvenVolume) {
                    return { status: 'NO-GO', desc: 'ยกเลิก / ขาดทุน', color: 'bg-rose-600', icon: 'ph-x-circle' };
                }
                if (operatingMarginPct < 10 || projectedVolume <= breakEvenVolume * 1.2) {
                    return { status: 'MODIFY', desc: 'ต้องปรับแผนใหม่', color: 'bg-amber-500', icon: 'ph-warning' };
                }
                return { status: 'GO', desc: 'น่าลงทุน (Strong)', color: 'bg-emerald-500', icon: 'ph-check-circle' };
            };

            const opMarginInfo = getOpMarginStatus(operatingMarginPct);
            const decision = getDecision();

            return (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <h2 className="text-2xl font-black text-slate-800 mb-2 flex items-center">
                            <i className="ph ph-calculator text-3xl mr-3 text-blue-600"></i> Simulator จำลองสถานการณ์ P&L
                        </h2>
                        <p className="text-slate-600 mb-8">ลองปรับตัวเลขสมมติฐาน เพื่อดูว่า P&L Structure (น้ำตก) และการตัดสินใจจะเปลี่ยนไปอย่างไร</p>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-1 bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-inner">
                                <h3 className="font-bold text-slate-800 mb-6 flex items-center border-b pb-2"><i className="ph ph-faders w-5 h-5 mr-2 text-blue-500"></i> สมมติฐาน</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ราคาขาย (Price)</label>
                                        <div className="relative">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 font-bold">฿</span>
                                            <input type="number" value={price} onChange={(e) => setPrice(Number(e.target.value))} className="w-full pl-8 border-slate-300 rounded-xl shadow-sm p-3 border font-black text-lg text-slate-800 outline-none" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ต้นทุนผันแปรต่อหน่วย (VC)</label>
                                        <div className="relative">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 font-bold">฿</span>
                                            <input type="number" value={variableCost} onChange={(e) => setVariableCost(Number(e.target.value))} className="w-full pl-8 border-slate-300 rounded-xl shadow-sm p-3 border font-black text-lg text-rose-700 outline-none" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ต้นทุนคงที่รวม (FC)</label>
                                        <div className="relative">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 font-bold">฿</span>
                                            <input type="number" value={fixedCost} onChange={(e) => setFixedCost(Number(e.target.value))} className="w-full pl-8 border-slate-300 rounded-xl shadow-sm p-3 border font-black text-lg text-amber-700 outline-none" />
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-slate-200">
                                        <label className="block text-sm font-black text-blue-700 mb-3">คาดการณ์ยอดขาย (Volume)</label>
                                        <div className="flex items-center space-x-4">
                                            <input type="range" min="0" max={Math.max(200, breakEvenVolume * 2)} value={projectedVolume} onChange={(e) => setProjectedVolume(Number(e.target.value))} className="w-full h-3 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                            <div className="bg-blue-600 text-white font-black text-xl w-16 py-2 rounded-xl text-center shadow-md">{projectedVolume}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-6">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                                        <span className="text-xs text-slate-500 font-bold uppercase mb-1">จุดคุ้มทุน</span>
                                        <span className="text-3xl font-black text-slate-800">{breakEvenVolume > 0 && isFinite(breakEvenVolume) ? breakEvenVolume : '-'}</span>
                                    </div>
                                    <div className="bg-emerald-50 border-emerald-200 p-5 rounded-2xl shadow-sm border flex flex-col items-center text-center">
                                        <span className="text-xs text-emerald-800 font-bold uppercase mb-1">1. Revenue</span>
                                        <span className="text-xl font-black text-emerald-700">฿{totalRevenue.toLocaleString()}</span>
                                    </div>
                                    <div className="bg-blue-50 border-blue-200 p-5 rounded-2xl shadow-sm border flex flex-col items-center text-center relative">
                                        <div className="absolute -left-3 top-1/2 transform -translate-y-1/2 w-6 h-6 bg-white rounded-full border border-slate-200 flex items-center justify-center font-bold text-slate-400 text-xs shadow-sm z-10">-VC</div>
                                        <span className="text-xs text-blue-800 font-bold uppercase mb-1">3. Gross Profit</span>
                                        <span className="text-xl font-black text-blue-700">฿{grossProfit.toLocaleString()}</span>
                                    </div>
                                    <div className={`p-5 rounded-2xl shadow-sm border flex flex-col items-center text-center relative ${operatingProfit >= 0 ? 'bg-indigo-50 border-indigo-200' : 'bg-rose-50 border-rose-300'}`}>
                                        <div className="absolute -left-3 top-1/2 transform -translate-y-1/2 w-6 h-6 bg-white rounded-full border border-slate-200 flex items-center justify-center font-bold text-slate-400 text-xs shadow-sm z-10">-FC</div>
                                        <span className={`text-xs font-bold uppercase mb-1 ${operatingProfit >= 0 ? 'text-indigo-800' : 'text-rose-800'}`}>5. OP Profit</span>
                                        <span className={`text-xl font-black ${operatingProfit >= 0 ? 'text-indigo-700' : 'text-rose-700'}`}>฿{operatingProfit.toLocaleString()}</span>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden flex flex-col md:flex-row">
                                    <div className={`${decision.color} p-8 flex flex-col justify-center items-center text-center md:w-2/5 shadow-inner`}>
                                        <i className={`ph-fill ${decision.icon} text-5xl text-white`}></i>
                                        <h2 className="text-4xl font-black text-white tracking-widest mt-2">{decision.status}</h2>
                                        <p className="text-white text-sm mt-3 font-bold bg-black/20 px-4 py-1.5 rounded-full backdrop-blur-sm">{decision.desc}</p>
                                    </div>
                                    <div className="p-6 md:p-8 md:w-3/5 space-y-4 bg-slate-50/50">
                                        <h3 className="font-bold text-slate-800 flex items-center border-b pb-2"><i className="ph ph-list-checks mr-2 text-indigo-500"></i> เกณฑ์ตัดสินใจ</h3>
                                        <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex justify-between items-center">
                                            <span className="text-sm font-bold text-slate-700">1. OP Margin</span>
                                            <span className={`text-xs font-black px-3 py-1.5 rounded-lg ${opMarginInfo.bg} ${opMarginInfo.color}`}>{operatingMarginPct.toFixed(1)}% ({opMarginInfo.label})</span>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex justify-between items-center">
                                            <span className="text-sm font-bold text-slate-700">2. ยอดขาย vs คุ้มทุน</span>
                                            <span className={`text-sm font-black ${projectedVolume >= breakEvenVolume ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                {projectedVolume} vs {breakEvenVolume > 0 && isFinite(breakEvenVolume) ? breakEvenVolume : '-'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. Case Study Section (โค้ดเดิม)
        // ==========================================
        function CaseStudySection() {
            return (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200">
                        <div className="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
                            <div>
                                <span className="text-xs font-black tracking-widest text-blue-600 uppercase mb-2 block bg-blue-50 w-fit px-3 py-1 rounded-full border border-blue-100">Case Study</span>
                                <h2 className="text-3xl font-black text-slate-800">คอร์ส "Digital Creativity & AI Tools"</h2>
